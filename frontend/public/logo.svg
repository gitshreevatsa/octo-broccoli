<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <defs>
    <clipPath id="lens-clip">
      <circle cx="13" cy="13" r="6.2"/>
    </clipPath>
  </defs>
  <!-- Magnifying glass ring -->
  <circle cx="13" cy="13" r="7.5" stroke="#60a5fa" stroke-width="2.2"/>
  <!-- Rising trend line clipped to lens -->
  <g clip-path="url(#lens-clip)">
    <polyline points="7,17 10,13 13,15 17,9" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="17" cy="9" r="1.5" fill="#60a5fa"/>
  </g>
  <!-- Handle -->
  <line x1="18.8" y1="18.8" x2="26" y2="26" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
</svg>
