# ─────────────────────────────────────────────
#  Job Search Configuration
#  Edit this file, then run: python main.py
# ─────────────────────────────────────────────

role: "RTL Design Engineer"
location: "Remote"
prefer_remote: false
experience_years: 3

# Minimum salary — enter in your currency
salary_min: 0
salary_currency: "USD" # USD | INR | GBP | EUR | CAD | AUD | SGD | AED

# How many results to fetch per source
results_per_source: 50

# Only show jobs posted within this many hours (0 = no filter)
posted_within_hours: 0

# ── Pinned ATS companies ───────────────────────────────────────────────────────
# Companies to ALWAYS check regardless of search engine results.
# Add slugs you know are relevant — handles small/new companies DDG doesn't index.
# Format: slug as it appears in the URL
#   boards.greenhouse.io/{slug}         → add under greenhouse_slugs
#   job-boards.eu.greenhouse.io/{slug}  → add under greenhouse_eu_slugs
#   jobs.lever.co/{slug}                → add under lever_slugs
#   jobs.ashbyhq.com/{slug}             → add under ashby_slugs

pinned_companies:
  greenhouse_slugs: [] # e.g. ["stripe", "openai"]
  greenhouse_eu_slugs: []
  lever_slugs: []
  ashby_slugs: []

# ── Sources ────────────────────────────────────────────────────────────────────
sources:
  # via python-jobspy (free)
  linkedin: true
  glassdoor: true
  ziprecruiter: true
  google: true

  # via Anakin Wire (requires credits)
  indeed: true
  jobicy: true
  remoteok: true
  weworkremotely: true

  # ATS boards — DuckDuckGo discovery + public APIs (free)
  greenhouse: true
  lever: true
  ashby: true

# Ranking weights (must add up to 1.0)
ranking_weights:
  relevance: 0.35
  salary: 0.25
  recency: 0.25
  remote: 0.15
