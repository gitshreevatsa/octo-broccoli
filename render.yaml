services:
  - type: web
    name: job-searcher
    runtime: docker
    plan: starter          # $7/mo — upgrade to standard for more RAM if searches are slow
    healthCheckPath: /health

    disk:
      name: results-storage
      mountPath: /app/results
      sizeGB: 1             # stores all search result JSON files

    envVars:
      - key: RESULTS_DIR
        value: /app/results
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ANAKIN_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://octo-broccoli.onrender.com  # update to your actual domain
